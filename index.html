<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>낱말 퍼즐 교실</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Pen+Script&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0A1628;--blue:#1A3A6B;--mid:#2356A8;--sky:#4A8FE7;
  --lite:#A8C8F8;--chalk:#EFF6FF;--white:#FFFFFF;--accent:#FFD166;
  --green:#22C55E;--red:#EF4444;--border:#C8DCF8;
  --shadow:0 4px 24px rgba(10,22,40,0.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:linear-gradient(135deg,#EBF3FF 0%,#F7FAFF 60%,#DDE9FA 100%);font-family:'Nanum Gothic',sans-serif;color:var(--navy);}

.topnav{background:var(--blue);padding:0 2rem;height:56px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 12px rgba(10,22,40,0.18);}
.logo{font-family:'Nanum Pen Script',cursive;font-size:26px;color:var(--white);letter-spacing:1px;}
.logo span{color:var(--accent);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-badge{background:rgba(255,255,255,0.15);color:var(--white);font-size:12px;padding:4px 12px;border-radius:20px;font-weight:700;}

.wrapper{max-width:920px;margin:0 auto;padding:2rem 1.25rem 4rem;}

.chalkboard{background:var(--blue);border-radius:16px;padding:1.75rem 2.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.chalkboard::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(255,255,255,0.03) 28px,rgba(255,255,255,0.03) 29px),repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,0.03) 28px,rgba(255,255,255,0.03) 29px);pointer-events:none;}
.cb-title{font-family:'Nanum Pen Script',cursive;font-size:30px;color:var(--white);margin-bottom:4px;position:relative;}
.cb-title span{color:var(--accent);}
.cb-sub{font-size:13px;color:var(--lite);position:relative;}
.chalk-line{height:3px;background:linear-gradient(90deg,rgba(255,255,255,0.6),rgba(255,255,255,0.1));border-radius:2px;margin:12px 0 14px;}
.cb-steps{font-size:13px;color:var(--lite);line-height:2;position:relative;}

.card{background:var(--white);border-radius:14px;border:1.5px solid var(--border);padding:1.5rem;margin-bottom:1.25rem;box-shadow:0 2px 12px rgba(74,143,231,0.07);}
.card-title{font-size:12px;font-weight:700;color:var(--mid);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';width:4px;height:16px;background:var(--sky);border-radius:2px;}

.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:1.25rem;background:var(--chalk);margin-bottom:12px;}
.upload-zone:hover{border-color:var(--sky);}
.upload-desc{font-size:12px;color:#4A6FA5;line-height:1.7;margin-bottom:10px;}
.upload-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.upload-result{font-size:12px;margin-top:8px;padding:6px 12px;border-radius:8px;}
.upload-result.ok{background:#DCFCE7;color:#166534;}
.upload-result.err{background:#FEE2E2;color:#991B1B;}

.divider{display:flex;align-items:center;gap:10px;margin:12px 0;font-size:12px;color:#6B8CB8;font-weight:700;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

input[type=text],input[type=file],select{font-family:'Nanum Gothic',sans-serif;font-size:14px;height:38px;padding:0 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);color:var(--navy);outline:none;transition:border-color .2s;}
input[type=text]:focus,select:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(74,143,231,0.12);}
input[type=file]{height:auto;padding:6px 10px;}

.btn{font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;height:38px;padding:0 16px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--mid);color:var(--white);}
.btn-primary:hover{background:var(--blue);}
.btn-sky{background:var(--sky);color:var(--white);}
.btn-sky:hover{background:var(--mid);}
.btn-outline{background:transparent;color:var(--mid);border:1.5px solid var(--border);}
.btn-outline:hover{background:var(--chalk);}
.btn-accent{background:var(--accent);color:var(--navy);}
.btn-accent:hover{opacity:.88;}
.btn-green{background:#16A34A;color:var(--white);}
.btn-green:hover{background:#15803D;}
.btn-lg{height:46px;font-size:15px;padding:0 24px;border-radius:10px;width:100%;}
.btn:disabled{opacity:.35;cursor:not-allowed;}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--chalk);border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:700;color:var(--blue);}
.chip button{background:none;border:none;cursor:pointer;color:#6B8CB8;font-size:13px;padding:0;}
.chip button:hover{color:var(--red);}

/* Student link table */
.link-table{width:100%;border-collapse:collapse;font-size:13px;}
.link-table th{background:var(--chalk);padding:9px 12px;text-align:left;font-weight:700;color:var(--mid);border-bottom:2px solid var(--border);font-size:11px;letter-spacing:.04em;text-transform:uppercase;}
.link-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.link-table tr:last-child td{border-bottom:none;}
.link-table tr:hover td{background:var(--chalk);}
.url-cell{font-size:11px;color:#4A6FA5;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.status-pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.status-done{background:#DCFCE7;color:#166534;}
.status-pending{background:#FEF9C3;color:#854D0E;}
.status-count{background:#DBEAFE;color:#1E40AF;}

/* Student input screen */
.student-header{background:linear-gradient(135deg,var(--blue),var(--mid));border-radius:16px;padding:1.5rem 2rem;margin-bottom:1.5rem;color:var(--white);}
.student-header h2{font-family:'Nanum Pen Script',cursive;font-size:28px;margin-bottom:4px;}
.student-header .sh-sub{font-size:13px;color:var(--lite);}

.word-slots{display:flex;flex-direction:column;gap:14px;margin-bottom:1rem;}
.word-slot{background:var(--white);border:2px solid var(--border);border-radius:12px;padding:16px 18px;}
.word-slot.filled{border-color:var(--sky);background:var(--chalk);}
.ws-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ws-num{width:28px;height:28px;border-radius:50%;background:var(--mid);color:var(--white);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ws-title{font-size:14px;font-weight:700;color:var(--navy);}
.ws-fields{display:grid;grid-template-columns:1fr 2fr auto;gap:8px;align-items:center;}

/* Puzzle / solve */
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:var(--chalk);padding:5px;border-radius:12px;border:1.5px solid var(--border);}
.tab{flex:1;padding:9px 0;border:none;background:transparent;cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;color:#4A6FA5;border-radius:8px;transition:all .15s;}
.tab.active{background:var(--mid);color:var(--white);box-shadow:0 2px 8px rgba(35,86,168,0.25);}
.tab:hover:not(.active){background:var(--border);}
.panel{display:none;}.panel.active{display:block;}

.solve-layout{display:grid;grid-template-columns:1fr 230px;gap:1.5rem;}
#crossword-grid{display:inline-grid;border:2px solid var(--mid);border-radius:10px;overflow:hidden;margin-bottom:12px;box-shadow:0 4px 16px rgba(35,86,168,0.12);}
.cell{width:38px;height:38px;position:relative;display:flex;align-items:center;justify-content:center;}
.cell.black{background:var(--blue);}
.cell.white{background:var(--white);border:1px solid #C8DCF8;cursor:pointer;transition:background .1s;}
.cell.white:hover{background:var(--chalk);}
.cell.white.sel{background:#DBEAFE;}
.cell.white.hi{background:#EBF3FF;}
.cell.white.ok{background:#DCFCE7;}
.cell.white.ng{background:#FEE2E2;}
.cell input{position:absolute;inset:0;width:100%;height:100%;border:none;background:transparent;text-align:center;font-size:16px;font-weight:700;color:var(--navy);outline:none;cursor:pointer;caret-color:transparent;font-family:'Nanum Gothic',sans-serif;}
.cnum{position:absolute;top:2px;left:3px;font-size:8px;font-weight:700;color:var(--sky);line-height:1;pointer-events:none;z-index:1;}

.clue-box{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;max-height:360px;overflow-y:auto;}
.clue-sec-title{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.ci{padding:5px 8px;border-radius:6px;cursor:pointer;display:flex;gap:6px;line-height:1.5;font-size:12px;transition:background .1s;}
.ci:hover{background:var(--chalk);}
.ci.active{background:#DBEAFE;color:var(--mid);}
.cn{font-weight:700;min-width:18px;color:var(--sky);}

.action-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.score-b{display:inline-block;padding:4px 12px;border-radius:8px;font-size:13px;font-weight:700;}
.score-b.g{background:#DCFCE7;color:#166534;}
.score-b.o{background:#FEF9C3;color:#854D0E;}
.score-b.r{background:#FEE2E2;color:#991B1B;}

.section-lbl{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.no-content{font-size:13px;color:#4A6FA5;padding:2rem 0;text-align:center;}

/* share modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(10,22,40,0.5);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:16px;padding:2rem;max-width:500px;width:90%;box-shadow:0 8px 40px rgba(10,22,40,0.25);}
.modal h3{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.modal-sub{font-size:13px;color:#4A6FA5;margin-bottom:16px;}
.share-box{background:linear-gradient(135deg,#1A3A6B,#2356A8);border-radius:12px;padding:14px 18px;}
.share-box-label{font-size:11px;font-weight:700;color:var(--lite);letter-spacing:.04em;margin-bottom:8px;}
.share-url-row{display:flex;gap:8px;align-items:center;}
.share-url{flex:1;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--white);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.copy-btn{background:var(--accent);color:var(--navy);border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nanum Gothic',sans-serif;}
.copy-btn:hover{opacity:.9;}
.copy-toast{font-size:11px;color:var(--accent);margin-top:6px;min-height:16px;}

/* progress bar */
.progress-bar{height:8px;background:#DBEAFE;border-radius:4px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;background:var(--mid);border-radius:4px;transition:width .4s;}

.err{font-size:12px;color:var(--red);min-height:16px;margin-top:4px;}
.info{font-size:12px;color:#4A6FA5;margin-top:6px;}

/* consolidated puzzle header */
.big-puzzle-header{background:linear-gradient(135deg,#0A1628,#1A3A6B);border-radius:16px;padding:1.5rem 2rem;margin-bottom:1.5rem;color:var(--white);}
.bph-title{font-family:'Nanum Pen Script',cursive;font-size:28px;margin-bottom:4px;}
.bph-meta{font-size:13px;color:var(--lite);}

@media(max-width:640px){
  .solve-layout{grid-template-columns:1fr;}
  .ws-fields{grid-template-columns:1fr 1fr;}.ws-fields button{grid-column:span 2;}
  .link-table td:nth-child(2){display:none;}
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="logo">📖 낱말퍼즐 <span>교실</span></div>
  <div class="nav-right">
    <div id="nav-info" class="nav-badge" style="display:none;"></div>
    <button id="nav-teacher-btn" class="btn btn-outline" style="display:none;font-size:12px;color:var(--white);border-color:rgba(255,255,255,0.3);" onclick="goTeacher()">선생님 화면</button>
  </div>
</nav>

<div class="wrapper" id="app-root"></div>

<!-- Share Modal -->
<div class="modal-bg" id="share-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title">🔗 링크 공유</h3>
    <p class="modal-sub" id="modal-sub"></p>
    <div class="share-box">
      <div class="share-box-label">공유 링크</div>
      <div class="share-url-row">
        <div class="share-url" id="modal-url"></div>
        <button class="copy-btn" onclick="copyModal()">복사</button>
      </div>
      <div class="copy-toast" id="modal-toast"></div>
    </div>
    <div style="margin-top:16px;text-align:right;">
      <button class="btn btn-outline" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const DB_KEY = 'xword_classroom_v3';
let state = {
  mode: 'teacher_setup',   // teacher_setup | teacher_manage | student_input | consolidated_puzzle
  students: {},            // { name: { words:[{word,clue},...], submitted:bool } }
  consolidated: null,      // layout after teacher merges
  classTitle: '우리반 낱말퍼즐'
};

// Persist to localStorage
function save(){ try{ localStorage.setItem(DB_KEY, JSON.stringify(state)); }catch(e){} }
function load(){
  try{
    const d = JSON.parse(localStorage.getItem(DB_KEY)||'null');
    if(d && d.students) state = d;
  }catch(e){}
}

// ── URL helpers ──
function encodeState(partial){
  return btoa(unescape(encodeURIComponent(JSON.stringify(partial))));
}
function decodeState(hash){
  try{ return JSON.parse(decodeURIComponent(escape(atob(hash)))); }catch(e){ return null; }
}
function makeStudentUrl(name){
  const payload = encodeState({ view:'student', name, ts: Date.now() });
  return location.origin + location.pathname + '#' + payload;
}
function makeTeacherUrl(){
  const payload = encodeState({ view:'teacher' });
  return location.origin + location.pathname + '#' + payload;
}
function makePuzzleUrl(){
  const payload = encodeState({ view:'puzzle' });
  return location.origin + location.pathname + '#' + payload;
}

// ══════════════════════════════════════════════
//  ROUTER
// ══════════════════════════════════════════════
function route(){
  load();
  const hash = location.hash.slice(1);
  if(hash){
    const d = decodeState(hash);
    if(d){
      if(d.view === 'student' && d.name){
        renderStudentInput(d.name);
        return;
      }
      if(d.view === 'teacher'){
        renderTeacher();
        return;
      }
      if(d.view === 'puzzle'){
        renderConsolidatedPuzzle();
        return;
      }
    }
  }
  // default: check if students exist
  if(Object.keys(state.students).length > 0){
    renderTeacher();
  } else {
    renderSetup();
  }
}

function goTeacher(){
  renderTeacher();
}

// ══════════════════════════════════════════════
//  SCREEN 1: TEACHER SETUP
// ══════════════════════════════════════════════
function renderSetup(){
  document.getElementById('nav-info').style.display='none';
  document.getElementById('nav-teacher-btn').style.display='none';
  document.getElementById('app-root').innerHTML = `
    <div class="chalkboard">
      <div class="cb-title">한국어 낱말퍼즐 <span>교실</span></div>
      <div class="cb-sub">학생이 직접 단어를 입력하고, 모아서 하나의 큰 십자말풀이를 만들어요</div>
      <div class="chalk-line"></div>
      <div class="cb-steps">
        ① 학생 명단 입력 &nbsp;→&nbsp; ② 학생별 링크 공유 &nbsp;→&nbsp; ③ 각자 단어 3개 입력 &nbsp;→&nbsp; ④ 선생님이 취합 &amp; 퍼즐 생성
      </div>
    </div>

    <div class="card">
      <div class="card-title">수업 제목</div>
      <input type="text" id="class-title-inp" placeholder="예: 3학년 2반 봄 낱말퍼즐" style="width:100%;max-width:400px;" value="${state.classTitle}"/>
    </div>

    <div class="card">
      <div class="card-title">엑셀/CSV로 학생 명단 불러오기</div>
      <div class="upload-zone">
        <div class="upload-desc">
          <strong>지원 형식:</strong> .xlsx, .xls, .csv &nbsp;|&nbsp; 첫 번째 열에 학생 이름 (1행 헤더 자동 감지)
        </div>
        <div class="upload-row">
          <input type="file" id="excel-file" accept=".xlsx,.xls,.csv"/>
          <button class="btn btn-sky" onclick="loadExcel()">📂 불러오기</button>
        </div>
        <div id="upload-result"></div>
      </div>
      <div class="divider">또는 직접 입력</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="new-student" placeholder="학생 이름" style="width:160px;" onkeydown="if(event.key==='Enter')addStudentManual()"/>
        <button class="btn btn-primary" onclick="addStudentManual()">+ 추가</button>
        <span id="stu-count" style="font-size:12px;color:#4A6FA5;"></span>
      </div>
      <div class="chips" id="stu-chips"></div>
      <div id="start-wrap" style="display:none;margin-top:18px;">
        <button class="btn btn-accent btn-lg" onclick="finishSetup()">▶ 명단 확정 &amp; 링크 생성하기</button>
      </div>
    </div>
  `;
}

function addStudentManual(){
  const inp=document.getElementById('new-student');
  const n=inp.value.trim(); if(!n) return;
  if(!state.students[n]) state.students[n]={words:[],submitted:false};
  inp.value=''; save(); refreshSetupUI();
}

function removeStudent(n){
  delete state.students[n]; save(); refreshSetupUI();
}

function refreshSetupUI(){
  const names=Object.keys(state.students);
  const chips=document.getElementById('stu-chips');
  const count=document.getElementById('stu-count');
  const wrap=document.getElementById('start-wrap');
  if(!chips) return;
  count.textContent=names.length?`총 ${names.length}명`:'';
  wrap.style.display=names.length?'block':'none';
  chips.innerHTML=names.map(n=>`<div class="chip"><span>${n}</span><button onclick="removeStudent('${n}')">✕</button></div>`).join('');
}

function loadExcel(){
  const file=document.getElementById('excel-file').files[0];
  if(!file){ showUploadResult('파일을 선택해주세요.','err'); return; }
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      let names=[];
      if(file.name.endsWith('.csv')){
        const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
        lines.forEach((line,i)=>{
          const first=line.split(',')[0].trim().replace(/^"|"$/g,'');
          if(!first) return;
          const lc=first.toLowerCase();
          if(i===0&&(lc==='이름'||lc==='name'||lc==='학생'||lc==='학생이름')) return;
          names.push(first);
        });
      } else {
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        XLSX.utils.sheet_to_json(ws,{header:1}).forEach((row,i)=>{
          const val=row[0]!=null?String(row[0]).trim():'';
          if(!val) return;
          const lc=val.toLowerCase();
          if(i===0&&(lc==='이름'||lc==='name'||lc==='학생'||lc==='학생이름')) return;
          names.push(val);
        });
      }
      names=names.filter(n=>n.length>0);
      if(!names.length){ showUploadResult('이름을 찾을 수 없어요. 첫 번째 열을 확인해주세요.','err'); return; }
      names.forEach(n=>{ if(!state.students[n]) state.students[n]={words:[],submitted:false}; });
      showUploadResult(`✓ ${names.length}명 불러오기 완료!`,'ok');
      save(); refreshSetupUI();
    }catch(err){ showUploadResult('파일 오류: '+err.message,'err'); }
  };
  if(file.name.endsWith('.csv')) reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}

function showUploadResult(msg,type){
  const el=document.getElementById('upload-result');
  if(el){ el.className='upload-result '+type; el.textContent=msg; }
}

function finishSetup(){
  const t=document.getElementById('class-title-inp');
  if(t) state.classTitle=t.value.trim()||'우리반 낱말퍼즐';
  save();

function updateWord(i,name){ state.students[name].words[i].word=document.getElementById('word-'+i).value.trim(); }
function updateClue(i,name){ state.students[name].words[i].clue=document.getElementById('clue-'+i).value.trim(); }

function saveWord(i,name){
  const w=document.getElementById('word-'+i).value.trim();
  const c=document.getElementById('clue-'+i).value.trim();
  const errEl=document.getElementById('err-'+i);
  if(!w){ errEl.textContent='단어를 입력해주세요.'; return; }
  if([...w].length<2){ errEl.textContent='단어는 2글자 이상이어야 합니다.'; return; }
  if(!c){ errEl.textContent='힌트를 입력해주세요.'; return; }
  errEl.textContent='';
  state.students[name].words[i]={word:w,clue:c};
  save();
  // re-render to update slots
  renderStudentInput(name);
}

function submitWords(name){
  const s=state.students[name];
  const words=s.words.slice(0,3);
  const valid=words.every(w=>w.word&&[...w.word].length>=2&&w.clue);
  if(!valid){ const el=document.getElementById('submit-err'); if(el) el.textContent='단어와 힌트를 모두 입력해주세요.'; return; }
  s.submitted=true;
  save();
  renderStudentInput(name);
}

// ══════════════════════════════════════════════
//  CONSOLIDATE – merge all words into one puzzle
// ══════════════════════════════════════════════
function consolidate(){
  load();
  const allWords=[];
  for(const [name,s] of Object.entries(state.students)){
    for(const w of s.words){
      if(w.word && w.clue && [...w.word].length>=2){
        allWords.push({word:w.word, clue:`[${name}] ${w.clue}`});
      }
    }
  }
  if(allWords.length<2){ alert('단어가 부족해요. 학생들이 먼저 단어를 입력해야 합니다.'); return; }

  // deduplicate
  const seen=new Set();
  const unique=allWords.filter(w=>{ if(seen.has(w.word)) return false; seen.add(w.word); return true; });

  const sorted=unique.sort((a,b)=>[...b.word].length-[...a.word].length);
  let best=null;
  for(let a=0;a<120;a++){
    const r=tryPlace(sorted);
    if(r&&(!best||r.placed.length>best.placed.length)){ best=r; if(best.placed.length===sorted.length) break; }
  }
  if(!best){ alert('퍼즐 배치 실패. 다시 시도해주세요.'); return; }
  state.consolidated=best;
  save();
  renderTeacher();
}

// ══════════════════════════════════════════════
//  CROSSWORD ENGINE
// ══════════════════════════════════════════════
function gc(w){ return [...w]; }

function tryPlace(sorted){
  const OFF=25; const pos=[];
  pos.push({word:sorted[0].word,clue:sorted[0].clue,row:OFF,col:OFF,dir:'across'});
  for(let wi=1;wi<sorted.length;wi++){
    const w=sorted[wi]; const wc=gc(w.word); const cands=[];
    for(const pw of pos){
      const pwc=gc(pw.word);
      for(let pi=0;pi<pwc.length;pi++) for(let wi2=0;wi2<wc.length;wi2++){
        if(pwc[pi]===wc[wi2]){
          const nd=pw.dir==='across'?'down':'across';
          let r,c;
          if(nd==='down'){r=pw.row-wi2;c=pw.col+pi;}
          else{r=pw.row+pi;c=pw.col-wi2;}
          cands.push({word:w.word,clue:w.clue,row:r,col:c,dir:nd});
        }
      }
    }
    for(let i=cands.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cands[i],cands[j]]=[cands[j],cands[i]];}
    // try intersecting first, then independent placement if no intersection
    let placed=false;
    for(const cand of cands){ if(canPlace(pos,cand)){ pos.push(cand); placed=true; break; } }
    if(!placed){
      // place independently (no intersection required)
      const independent=findIndependentPos(pos,w);
      if(independent) pos.push(independent);
    }
  }
  if(!pos.length) return null;
  let minR=Infinity,minC=Infinity;
  for(const p of pos){ minR=Math.min(minR,p.row); minC=Math.min(minC,p.col); }
  const norm=pos.map(p=>({...p,row:p.row-minR+1,col:p.col-minC+1}));
  let maxR=0,maxC=0;
  for(const p of norm){
    const len=gc(p.word).length;
    if(p.dir==='across'){ maxR=Math.max(maxR,p.row); maxC=Math.max(maxC,p.col+len-1); }
    else{ maxR=Math.max(maxR,p.row+len-1); maxC=Math.max(maxC,p.col); }
  }
  return{placed:norm,rows:maxR+2,cols:maxC+2};
}

function findIndependentPos(existing,w){
  // build occupied map
  const occ=buildOcc(existing);
  const wc=gc(w.word);
  // find the bounding box
  let minR=Infinity,minC=Infinity,maxR=0,maxC=0;
  for(const key of Object.keys(occ)){
    const [r,c]=key.split(',').map(Number);
    minR=Math.min(minR,r); minC=Math.min(minC,c);
    maxR=Math.max(maxR,r); maxC=Math.max(maxC,c);
  }
  // try placing to the right or below with a gap
  const dirs=['across','down'];
  for(const dir of dirs){
    let r,c;
    if(dir==='across'){ r=minR; c=maxC+3; }
    else{ r=maxR+3; c=minC; }
    const cand={word:w.word,clue:w.clue,row:r,col:c,dir};
    if(canPlace(existing,cand)) return cand;
    // try other side
    if(dir==='across'){ cand.col=minC; cand.row=maxR+3; }
    else{ cand.row=minR; cand.col=maxC+3; }
    if(canPlace(existing,cand)) return cand;
  }
  return null;
}

function buildOcc(existing){
  const occ={};
  for(const p of existing){
    const pc=gc(p.word);
    for(let i=0;i<pc.length;i++){
      const r=p.dir==='across'?p.row:p.row+i;
      const c=p.dir==='across'?p.col+i:p.col;
      occ[r+','+c]={letter:pc[i],dir:p.dir};
    }
  }
  return occ;
}

function canPlace(existing,cand){
  const occ=buildOcc(existing);
  const wc=gc(cand.word);
  for(let i=0;i<wc.length;i++){
    const r=cand.dir==='across'?cand.row:cand.row+i;
    const c=cand.dir==='across'?cand.col+i:cand.col;
    const k=r+','+c;
    if(occ[k]){ if(occ[k].letter!==wc[i]||occ[k].dir===cand.dir) return false; }
    const pr=cand.dir==='across'?r-1:r, pc2=cand.dir==='across'?c:c-1;
    const pr2=cand.dir==='across'?r+1:r, pc3=cand.dir==='across'?c:c+1;
    if(occ[pr+','+pc2]&&!occ[k]) return false;
    if(occ[pr2+','+pc3]&&!occ[k]) return false;
  }
  const bR=cand.dir==='across'?cand.row:cand.row-1, bC=cand.dir==='across'?cand.col-1:cand.col;
  const aR=cand.dir==='across'?cand.row:cand.row+wc.length, aC=cand.dir==='across'?cand.col+wc.length:cand.col;
  if(occ[bR+','+bC]||occ[aR+','+aC]) return false;
  return true;
}

function buildGrid(layout){
  gridSize={rows:layout.rows,cols:layout.cols};
  grid=Array.from({length:layout.rows},()=>Array.from({length:layout.cols},()=>({black:true,answer:'',number:null,wordIds:[]})));
  layout.placed.forEach((p,wi)=>{
    const pc=gc(p.word);
    for(let i=0;i<pc.length;i++){
      const r=p.dir==='across'?p.row:p.row+i, c=p.dir==='across'?p.col+i:p.col;
      grid[r][c].black=false; grid[r][c].answer=pc[i]; grid[r][c].wordIds.push(wi);
    }
  });
  let num=1;
  for(let r=0;r<gridSize.rows;r++) for(let c=0;c<gridSize.cols;c++){
    if(grid[r][c].black) continue;
    const sA=(c===0||grid[r][c-1].black)&&c+1<gridSize.cols&&!grid[r][c+1].black;
    const sD=(r===0||grid[r-1][c].black)&&r+1<gridSize.rows&&!grid[r+1][c].black;
    if(sA||sD){ grid[r][c].number=num; layout.placed.forEach(p=>{if(p.row===r&&p.col===c)p.number=num;}); num++; }
  }
}

function renderGridDom(){
  const container=document.getElementById('crossword-grid');
  container.style.gridTemplateColumns=`repeat(${gridSize.cols},38px)`;
  container.style.gridTemplateRows=`repeat(${gridSize.rows},38px)`;
  container.innerHTML='';
  for(let r=0;r<gridSize.rows;r++) for(let c=0;c<gridSize.cols;c++){
    const cell=grid[r][c]; const div=document.createElement('div');
    div.className='cell '+(cell.black?'black':'white'); div.dataset.r=r; div.dataset.c=c;
    if(!cell.black){
      if(cell.number){const sp=document.createElement('span');sp.className='cnum';sp.textContent=cell.number;div.appendChild(sp);}
      const inp=document.createElement('input');inp.type='text';inp.maxLength=2;inp.dataset.r=r;inp.dataset.c=c;inp.setAttribute('autocomplete','off');
      inp.addEventListener('mousedown',e=>{e.preventDefault();if(selCell&&selCell[0]===r&&selCell[1]===c)selDir=selDir==='across'?'down':'across';selCell=[r,c];selectCell(r,c);inp.focus();});
      inp.addEventListener('keydown',e=>handleKey(e,r,c));
      inp.addEventListener('input',e=>{const chars=gc(e.target.value);if(chars.length>0){e.target.value=chars[chars.length-1];moveNext(r,c);}else e.target.value='';});
      div.appendChild(inp);
    }
    container.appendChild(div);
  }
  renderCluesDom();
  if(placedWords.length) selectCell(placedWords[0].row,placedWords[0].col);
}

function selectCell(r,c){
  if(r<0||r>=gridSize.rows||c<0||c>=gridSize.cols||grid[r][c].black) return;
  selCell=[r,c]; const wids=grid[r][c].wordIds; let found=null;
  for(const wi of wids){if(placedWords[wi].dir===selDir){found=wi;break;}}
  if(found===null&&wids.length){found=wids[0];selDir=placedWords[found].dir;}
  activeWord=found; highlightCells(); updateClueHL();
  const inp=document.querySelector(`input[data-r="${r}"][data-c="${c}"]`); if(inp) inp.focus();
}

function highlightCells(){
  document.querySelectorAll('.cell.white').forEach(el=>el.classList.remove('sel','hi'));
  if(selCell){const el=document.querySelector(`.cell[data-r="${selCell[0]}"][data-c="${selCell[1]}"]`);if(el)el.classList.add('sel');}
  if(activeWord!==null){const p=placedWords[activeWord];const len=gc(p.word).length;for(let i=0;i<len;i++){const r=p.dir==='across'?p.row:p.row+i,c=p.dir==='across'?p.col+i:p.col;const el=document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);if(el&&!(selCell&&selCell[0]===r&&selCell[1]===c))el.classList.add('hi');}}
}

function handleKey(e,r,c){
  if(e.key==='Backspace'){if(e.target.value)e.target.value='';else movePrev(r,c);e.preventDefault();return;}
  const mv={'ArrowRight':()=>selDir==='across'?moveNext(r,c):(selDir='across',selectCell(r,c)),'ArrowLeft':()=>selDir==='across'?movePrev(r,c):(selDir='across',selectCell(r,c)),'ArrowDown':()=>selDir==='down'?moveNext(r,c):(selDir='down',selectCell(r,c)),'ArrowUp':()=>selDir==='down'?movePrev(r,c):(selDir='down',selectCell(r,c))};
  if(mv[e.key]){mv[e.key]();e.preventDefault();}
  if(e.key==='Tab'){e.preventDefault();nextWord(e.shiftKey);}
}

function moveNext(r,c){if(selDir==='across'&&c+1<gridSize.cols&&!grid[r][c+1].black)selectCell(r,c+1);else if(selDir==='down'&&r+1<gridSize.rows&&!grid[r+1][c].black)selectCell(r+1,c);}
function movePrev(r,c){if(selDir==='across'&&c-1>=0&&!grid[r][c-1].black)selectCell(r,c-1);else if(selDir==='down'&&r-1>=0&&!grid[r-1][c].black)selectCell(r-1,c);}

function nextWord(rev){
  const num=placedWords.filter(p=>p.number).sort((a,b)=>a.number!==b.number?a.number-b.number:['across','down'].indexOf(a.dir)-['across','down'].indexOf(b.dir));
  const cur=activeWord!==null?num.findIndex(p=>p===placedWords[activeWord]):-1;
  const nxt=rev?(cur-1+num.length)%num.length:(cur+1)%num.length;
  const pw=num[nxt];selDir=pw.dir;activeWord=placedWords.indexOf(pw);selCell=[pw.row,pw.col];
  highlightCells();updateClueHL();
  const inp=document.querySelector(`input[data-r="${pw.row}"][data-c="${pw.col}"]`);if(inp)inp.focus();
}

function updateClueHL(){
  document.querySelectorAll('.ci').forEach(el=>el.classList.remove('active'));
  if(activeWord!==null){const el=document.querySelector(`.ci[data-wi="${activeWord}"]`);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}}
}

function renderCluesDom(){
  const ac=document.getElementById('clues-across'),dn=document.getElementById('clues-down');
  ac.innerHTML='';dn.innerHTML='';
  const sorted=placedWords.filter(p=>p.number).sort((a,b)=>a.number-b.number);
  for(const pw of sorted){
    const wi=placedWords.indexOf(pw); const div=document.createElement('div');
    div.className='ci'; div.dataset.wi=wi;
    div.innerHTML=`<span class="cn">${pw.number}</span><span>${pw.clue}</span>`;
    div.addEventListener('click',()=>{selDir=pw.dir;activeWord=wi;selCell=[pw.row,pw.col];highlightCells();updateClueHL();const inp=document.querySelector(`input[data-r="${pw.row}"][data-c="${pw.col}"]`);if(inp)inp.focus();});
    (pw.dir==='across'?ac:dn).appendChild(div);
  }
}

function checkAnswers(){
  let ok=0,total=0;
  for(let r=0;r<gridSize.rows;r++) for(let c=0;c<gridSize.cols;c++){
    if(grid[r][c].black) continue; total++;
    const inp=document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);
    const cel=document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    if(!inp) continue; cel.classList.remove('ok','ng');
    if(inp.value){if(inp.value===grid[r][c].answer){ok++;cel.classList.add('ok');}else cel.classList.add('ng');}
  }
  const pct=total?Math.round(ok/total*100):0;
  const cls=pct>=80?'g':pct>=50?'o':'r';
  document.getElementById('score-display').innerHTML=`<span class="score-b ${cls}">${ok}/${total}칸 정답 (${pct}%)</span>`;
}

function revealSel(){
  if(activeWord===null) return;
  const pw=placedWords[activeWord]; const pc=gc(pw.word);
  for(let i=0;i<pc.length;i++){const r=pw.dir==='across'?pw.row:pw.row+i,c=pw.dir==='across'?pw.col+i:pw.col;const inp=document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);if(inp)inp.value=pc[i];}
}

function clearAll(){
  document.querySelectorAll('#crossword-grid input').forEach(i=>i.value='');
  document.querySelectorAll('.cell.white').forEach(el=>el.classList.remove('ok','ng'));
  document.getElementById('score-display').innerHTML='';
}

let _shareUrl='';

function showShareModal(name){
  const url=makeStudentUrl(name);

  document.getElementById('modal-sub').textContent=`이 링크를 ${name} 학생에게 공유하세요. 링크로 접속하면 단어를 입력할 수 있어요.`;
  document.getElementById('modal-url').textContent=url;
  document.getElementById('modal-toast').textContent='';
  document.getElementById('share-modal').classList.add('open');
}

function showPuzzleShareModal(){
  const url=makePuzzleUrl();
  _shareUrl=url;
  document.getElementById('modal-title').textContent='🧩 완성된 퍼즐 공유';
  document.getElementById('modal-sub').textContent='이 링크를 공유하면 누구나 완성된 퍼즐을 풀 수 있어요!';
  document.getElementById('modal-url').textContent=url;
  document.getElementById('modal-toast').textContent='';
  document.getElementById('share-modal').classList.add('open');
}

function showAllLinksModal(){
  const names=Object.keys(state.students);
  const all=names.map(n=>`${n}: ${makeStudentUrl(n)}`).join('\n');
  _shareUrl=all;
  document.getElementById('modal-title').textContent='📋 전체 학생 링크 목록';
  document.getElementById('modal-sub').textContent='복사 후 학생들에게 개별적으로 공유해주세요.';
  document.getElementById('modal-url').textContent=all;
  document.getElementById('modal-url').style.whiteSpace='pre';
  document.getElementById('modal-url').style.fontSize='10px';
  document.getElementById('modal-toast').textContent='';
  document.getElementById('share-modal').classList.add('open');
}

function closeModal(){
  document.getElementById('share-modal').classList.remove('open');
  document.getElementById('modal-url').style.whiteSpace='nowrap';
  document.getElementById('modal-url').style.fontSize='11px';
}

function copyModal(){
  navigator.clipboard.writeText(_shareUrl).then(()=>{
    document.getElementById('modal-toast').textContent='✓ 클립보드에 복사되었어요!';
    setTimeout(()=>document.getElementById('modal-toast').textContent='',2500);
  }).catch(()=>{
    document.getElementById('modal-toast').textContent='복사 실패 — 직접 선택해서 복사해주세요.';
  });
}
